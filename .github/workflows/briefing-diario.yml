name: Briefing Diário de Mercado

on:
  schedule:
    - cron: '0 8 * * *'   # 05:00 horário de Brasília (UTC-3 = 08:00 UTC)
  workflow_dispatch:        # permite rodar manualmente com 1 clique

jobs:
  gerar-briefing:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # necessário para fazer commit no repositório

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install anthropic

      - name: Gerar briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python gerar_briefing.py

      - name: Publicar no GitHub Pages
        run: |
          git config user.name  "Briefing Bot"
          git config user.email "bot@briefing"
          git add dados/
          git diff --cached --quiet || git commit -m "Briefing $(date +'%d/%m/%Y')"
          git push
