name: Briefing de Mercado

on:
  schedule:
    - cron: '0 8 * * 1,3,5'  # 05:00 Brasília — Segunda, Quarta e Sexta
  workflow_dispatch:           # botão de atualização manual no app

jobs:
  gerar-briefing:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install anthropic

      - name: Gerar briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY:    ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CSE_ID:     ${{ secrets.GOOGLE_CSE_ID }}
        run: python gerar_briefing.py

      - name: Publicar no GitHub Pages
        run: |
          git config user.name  "Daily News Bot"
          git config user.email "bot@dailynews"
          git add dados/
          git diff --cached --quiet || git commit -m "Briefing $(date +'%d/%m/%Y')"
          git push
