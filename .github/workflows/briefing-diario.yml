name: Briefing de Mercado

on:
  schedule:
    - cron: '0 8 1-31/2 * *'  # 05:00 Brasília (UTC-3) dias ímpares: 1,3,5...21,23...
  workflow_dispatch:         # permite rodar manualmente com 1 clique

jobs:
  gerar-briefing:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install anthropic

      - name: Gerar briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python gerar_briefing.py

      - name: Publicar no GitHub Pages
        run: |
          git config user.name  "Briefing Bot"
          git config user.email "bot@dailynews"
          git add dados/
          git diff --cached --quiet || git commit -m "Briefing $(date +'%d/%m/%Y')"
          git push
