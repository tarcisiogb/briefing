<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#030712;color:#F9FAFB;font-family:system-ui,-apple-system,sans-serif;min-height:100vh;padding-bottom:env(safe-area-inset-bottom)}
.header{background:#030712;border-bottom:1px solid #111827;padding:52px 20px 14px;position:sticky;top:0;z-index:100}
.agent-row{display:flex;align-items:center;gap:7px;margin-bottom:3px}
.dot{width:6px;height:6px;border-radius:50%;background:#10B981;box-shadow:0 0 7px #10B981;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.agent-label{font-size:10px;color:#10B981;font-family:monospace;letter-spacing:.1em}
h1{font-size:20px;font-weight:700}
.header-meta{display:flex;justify-content:space-between;align-items:center;margin-top:2px}
.header-date{font-size:11px;color:#6B7280;font-family:monospace}
.tabs{display:flex;overflow-x:auto;padding:10px 20px 0;gap:4px;background:#030712;border-bottom:1px solid #111827;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:7px 13px;border-radius:8px 8px 0 0;font-size:12px;font-weight:500;color:#6B7280;background:transparent;border:1px solid transparent;border-bottom:none;cursor:pointer;white-space:nowrap}
.tab.active{background:#0D1117;border-color:#1F2937;color:#F9FAFB;font-weight:600}
.content{background:#0D1117;border-left:1px solid #1F2937;border-right:1px solid #1F2937;border-bottom:1px solid #1F2937;margin:0 10px;border-radius:0 0 12px 12px;padding:0;min-height:200px;margin-bottom:16px}
.section{display:none}.section.active{display:block}
.sec-header{padding:14px 16px 10px;border-bottom:1px solid #1F2937}
.sec-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;margin-bottom:4px}
.sec-resumo{color:#9CA3AF;font-size:12px;line-height:1.6}
.sec-termo{display:inline-block;font-size:10px;font-weight:700;font-family:monospace;padding:2px 8px;border-radius:4px;margin-top:6px}
.positivo{color:#10B981;background:#022c22;border:1px solid #065F46}
.neutro{color:#F59E0B;background:#1c1400;border:1px solid #3d2e00}
.negativo{color:#EF4444;background:#1a0a0a;border:1px solid #3b1111}
.sub-tabs{display:flex;padding:10px 16px 0;gap:6px;border-bottom:1px solid #1F2937}
.sub-tab{padding:6px 14px;border-radius:6px 6px 0 0;font-size:11px;font-weight:600;cursor:pointer;border:1px solid transparent;border-bottom:none;white-space:nowrap}
.sub-tab.yesterday{color:#10B981;border-color:transparent}
.sub-tab.yesterday.active{background:#022c22;border-color:#065F46;color:#10B981}
.sub-tab.week{color:#6B7280;border-color:transparent}
.sub-tab.week.active{background:#111827;border-color:#1F2937;color:#9CA3AF}
.sub-content{display:none;padding:0 16px 12px}
.sub-content.active{display:block}
.empty{padding:20px 0;text-align:center;color:#374151;font-size:12px;font-family:monospace}
.item{display:flex;gap:12px;padding:12px 0;border-bottom:1px dashed #1a2a1a}
.sub-content.week .item{border-bottom-color:#1F2937}
.item:last-child{border-bottom:none}
.num{color:#374151;font-size:10px;font-family:monospace;min-width:18px;padding-top:2px;flex-shrink:0}
.body{flex:1;display:flex;flex-direction:column;gap:5px}
.meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.cat{font-size:9px;font-weight:700;font-family:monospace;text-transform:uppercase}
.cat-reg{color:#818CF8}.cat-merc{color:#38BDF8}.cat-tec{color:#A78BFA}.cat-comp{color:#FB7185}.cat-tend{color:#34D399}
.badge{font-size:8px;font-weight:700;padding:2px 5px;border-radius:3px;color:#fff;font-family:monospace}
.badge-alto{background:#EF4444}.badge-medio{background:#F59E0B}.badge-baixo{background:#10B981}
.dt{font-size:9px;font-family:monospace;padding:1px 5px;border-radius:3px;font-weight:600;color:#6B7280}
a.news{color:#E2E8F0;font-size:14px;font-weight:600;line-height:1.45;text-decoration:none;display:block}
a.news:hover,a.news:active{color:#60A5FA}
.dest{color:#6B7280;font-size:12px;line-height:1.5;border-left:2px solid #1F2937;padding-left:8px;font-style:italic}
.fonte{color:#4B5563;font-size:10px;font-family:monospace}
.hist-section{padding:14px 16px}
.hist-item{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid #1F2937;cursor:pointer}
.hist-item:last-child{border-bottom:none}
.hist-label{font-size:13px;font-weight:600;color:#F9FAFB}
.hist-sub{font-size:10px;color:#4B5563;font-family:monospace;margin-top:2px}
.hist-arr{color:#374151;font-size:16px}
.hist-current .hist-label{color:#60A5FA}
.state-msg{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:14px;color:#4B5563}
.state-msg .icon{font-size:32px}
.state-msg .txt{font-size:13px;font-family:monospace;text-align:center}
.state-msg .err{color:#EF4444;font-size:11px;font-family:monospace;margin-top:4px}
footer{text-align:center;padding:16px 16px 32px;color:#1F2937;font-size:10px;font-family:monospace;line-height:1.8}
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:#0D1117;border:1px solid #1F2937;border-radius:10px;padding:12px 20px;font-size:12px;font-family:monospace;color:#F9FAFB;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.btn-analisar{background:transparent;border:1px solid #1F2937;border-radius:6px;color:#A78BFA;font-size:9px;font-family:monospace;font-weight:700;padding:2px 8px;cursor:pointer;white-space:nowrap;letter-spacing:.05em}
.btn-analisar:hover{background:#1F2937;border-color:#A78BFA}
.btn-analisar.loading{color:#6B7280;border-color:#1F2937;cursor:wait}
.analise-panel{display:none;margin-top:10px;background:#0a0f1e;border:1px solid #1F2937;border-radius:8px;padding:14px;font-size:12px;line-height:1.6}
.analise-panel.open{display:block}
.analise-section{margin-bottom:10px}
.analise-section:last-child{margin-bottom:0}
.analise-label{font-size:9px;font-weight:700;font-family:monospace;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.analise-text{color:#9CA3AF;font-size:12px;line-height:1.6}
.lbl-cartoes{color:#38BDF8}.lbl-daily{color:#10B981}.lbl-beyond{color:#A78BFA}.lbl-shop{color:#FB7185}.lbl-tag{color:#F59E0B}.lbl-loyalty{color:#34D399}
</style>

  <div style="display:flex;justify-content:space-between;align-items:flex-start">
    <h1>Daily News</h1>
    <button id="btn-update" onclick="triggerUpdate()" style="background:#0D1117;border:1px solid #1F2937;border-radius:8px;color:#10B981;font-size:11px;font-family:monospace;padding:6px 12px;cursor:pointer;display:flex;align-items:center;gap:5px;margin-top:2px;white-space:nowrap">
      <span id="btn-icon">&#8635;</span>
      <span id="btn-label">Atualizar</span>
      <span style="font-size:8px;background:#1a0a0a;color:#EF4444;border:1px solid #3b1111;border-radius:3px;padding:1px 5px;margin-left:2px">ADMIN</span>

<div class="content" id="content-area">
  <div class="state-msg"><div class="icon" style="animation:spin 1s linear infinite">&#8635;</div><div class="txt">Carregando briefing...</div></div>
</div>

<div class="toast" id="toast"></div>
<script>

const GITHUB_USER = 'tarcisiogb';
const GITHUB_REPO = 'dailynews';
const BASE = 'https://' + GITHUB_USER + '.github.io/' + GITHUB_REPO;
const GH_WORKFLOW = 'briefing-diario.yml';
const ADMIN_PASS = '214563';

const TEMAS = [
  {id:'cartoes',    label:'💳 Cart\u00f5es'},
  {id:'pagamentos', label:'📲 Pagamentos'},
  {id:'marketplace',label:'🛒 Marketplace'},
  {id:'varejo',     label:'🏪 Varejo'},
  {id:'tag',        label:'🚗 Tag Veicular'},
  {id:'bancos',     label:'🏦 Bancos'},
  {id:'fintechs',   label:'⚡ Fintechs'},
  {id:'loyalty',    label:'🎯 Loyalty'},
  {id:'ia',         label:'🤖 IA'},
  {id:'socios',     label:'🏢 S\u00f3cios'},
];

const TEMA_CORES = {
  cartoes:     {bg:'#EFF6FF',border:'#BFDBFE',text:'#1D4ED8'},
  pagamentos:  {bg:'#F0FDFA',border:'#99F6E4',text:'#0F766E'},
  marketplace: {bg:'#FFF7ED',border:'#FED7AA',text:'#C2410C'},
  varejo:      {bg:'#F0FDF4',border:'#BBF7D0',text:'#15803D'},
  tag:         {bg:'#FEF9C3',border:'#FDE68A',text:'#A16207'},
  bancos:      {bg:'#EFF6FF',border:'#BFDBFE',text:'#1E40AF'},
  fintechs:    {bg:'#FAF5FF',border:'#E9D5FF',text:'#7C3AED'},
  loyalty:     {bg:'#FFF1F2',border:'#FECDD3',text:'#BE123C'},
  ia:          {bg:'#F0FDF4',border:'#6EE7B7',text:'#065F46'},
  socios:      {bg:'#F5F3FF',border:'#DDD6FE',text:'#5B21B6'},
};

const CAT = {'Regulat\u00f3rio':'cat-reg','Mercado':'cat-merc','Tecnologia':'cat-tec','Competi\u00e7\u00e3o':'cat-comp','Tend\u00eancia':'cat-tend'};
const IMP = {'alto':'badge-alto','m\u00e9dio':'badge-medio','baixo':'badge-baixo'};
const TERMO_LBL = {positivo:'\u2191 POSITIVO',neutro:'\u2192 NEUTRO',negativo:'\u2193 NEGATIVO'};
const MONTHS = {jan:1,fev:2,mar:3,abr:4,mai:5,jun:6,jul:7,ago:8,set:9,out:10,nov:11,dez:12};

window._newsData = {};
var activeTab = null;
var globalHistorico = [];
var pollingInterval = null;

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function parseDate(d) {
  var m = String(d).match(/^(\d{1,2})\/(\w{3})\/(\d{4})$/);
  if (!m) return null;
  return new Date(+m[3], (MONTHS[m[2].toLowerCase()]||1)-1, +m[1]);
}

function isRecente(d) {
  var pub = parseDate(d); if (!pub) return false;
  var cutoff = new Date(); cutoff.setDate(cutoff.getDate()-2); cutoff.setHours(0,0,0,0);
  var tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate()+1); tomorrow.setHours(0,0,0,0);
  return pub >= cutoff && pub < tomorrow;
}

function isThisWeek(d) {
  var pub = parseDate(d); if (!pub) return false;
  var cutoff = new Date(); cutoff.setDate(cutoff.getDate()-14); cutoff.setHours(0,0,0,0);
  var recente = new Date(); recente.setDate(recente.getDate()-2); recente.setHours(0,0,0,0);
  return pub >= cutoff && pub < recente;
}

function showToast(msg, duration) {
  duration = duration || 3000;
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, duration);
}

function showTab(id) {
  activeTab = id;
  var hp = document.getElementById('hist-panel');
  var ca = document.getElementById('content-area');
  if (hp) hp.style.display = 'none';
  if (ca) ca.style.display = 'block';
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.querySelectorAll('.section').forEach(function(s){ s.classList.remove('active'); });
  var te = document.getElementById('tab-'+id); if (te) te.classList.add('active');
  var se = document.getElementById('sec-'+id); if (se) se.classList.add('active');
}

function showSubTab(secId, which) {
  ['yesterday','week'].forEach(function(w) {
    var st = document.getElementById('subtab-'+secId+'-'+w);
    var sc = document.getElementById('subcontent-'+secId+'-'+w);
    if (st) st.classList.toggle('active', w===which);
    if (sc) sc.classList.toggle('active', w===which);
  });
}

function itemHTML(n, i) {
  var catCls = CAT[n.categoria] || 'cat-merc';
  var impCls = IMP[n.impacto] || 'badge-medio';
  var itemId = 'item-' + Math.random().toString(36).substr(2,9);
  window._newsData[itemId] = {titulo: n.titulo||'', url: n.url||'', destaque: n.destaque||''};

  var crossHTML = '';
  if (n.tambem_em && n.tambem_em.length) {
    n.tambem_em.forEach(function(tid) {
      var t = TEMAS.find(function(x){ return x.id === tid; });
      if (!t) return;
      var cor = TEMA_CORES[tid] || {bg:'#F3F4F6',border:'#D1D5DB',text:'#374151'};
      crossHTML += '<span onclick="showTab(\''+tid+'\')" style="display:inline-flex;align-items:center;gap:3px;font-size:9px;font-family:monospace;background:'+cor.bg+';border:0.5px solid '+cor.border+';border-radius:4px;padding:2px 7px;color:'+cor.text+';cursor:pointer">\u2197 '+esc(t.label)+'</span>';
    });
  }

  return '<div class="item">'
    + '<span class="num">'+String(i+1).padStart(2,'0')+'</span>'
    + '<div class="body">'
    + '<div class="meta">'
    + '<span class="cat '+esc(catCls)+'">'+esc(n.categoria)+'</span>'
    + '<span class="badge '+esc(impCls)+'">'+esc((n.impacto||'').toUpperCase())+'</span>'
    + '<span class="dt">'+esc(n.data_pub)+'</span>'
    + crossHTML
    + '</div>'
    + '<a class="news" href="'+esc(n.url)+'" target="_blank" rel="noopener">'+esc(n.titulo)+' \u2197</a>'
    + '<div class="dest">'+esc(n.destaque)+'</div>'
    + '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:2px">'
    + '<div class="fonte">\uD83D\uDCF0 '+esc(n.fonte)+'</div>'
    + '<button class="btn-analisar" id="btn-'+itemId+'" onclick="analisarNoticia(\''+itemId+'\')">\u2756 Analisar</button>'
    + '</div>'
    + '<div class="analise-panel" id="panel-'+itemId+'"></div>'
    + '</div>'
    + '</div>';
}

function renderContent(data) {
  document.getElementById('hdr-date').textContent = 'Edi\u00e7\u00e3o de '+(data.data_edicao||'');
  document.getElementById('footer-txt').textContent = 'Briefing de Mercado \u00b7 '+(data.data_geracao||'')+' \u00b7 Datas verificadas diretamente nas mat\u00e9rias';
  var area = document.getElementById('content-area');
  var html = '';
  TEMAS.forEach(function(tema) {
    var sec = (data.temas||{})[tema.id];
    if (!sec || !sec.noticias) { html += '<div class="section" id="sec-'+tema.id+'"></div>'; return; }
    var noticias = sec.noticias || [];
    var yesterday = noticias.filter(function(n){ return isRecente(n.data_pub); });
    var week = noticias.filter(function(n){ return isThisWeek(n.data_pub); });
    var yHTML = yesterday.length ? yesterday.map(itemHTML).join('') : '<div class="empty">Nenhuma not\u00edcia recente ainda</div>';
    var wHTML = week.length ? week.map(itemHTML).join('') : '<div class="empty">Nenhuma not\u00edcia adicional esta semana</div>';
    var yCount = yesterday.length ? '<span style="font-size:10px;background:#022c22;color:#10B981;border:1px solid #065F46;border-radius:10px;padding:1px 7px;font-family:monospace;margin-left:6px">'+yesterday.length+'</span>' : '';
    var wCount = week.length ? '<span style="font-size:10px;background:#111827;color:#6B7280;border:1px solid #1F2937;border-radius:10px;padding:1px 7px;font-family:monospace;margin-left:6px">'+week.length+'</span>' : '';
    html += '<div class="section" id="sec-'+tema.id+'">'
      + '<div class="sec-header"><div class="sec-title">'+esc(tema.label)+'</div>'
      + '<div class="sec-resumo">'+esc(sec.resumo||'')+'</div>'
      + '<span class="sec-termo '+esc(sec.termometro||'neutro')+'">'+(TERMO_LBL[sec.termometro]||'\u2192 NEUTRO')+'</span></div>'
      + '<div class="sub-tabs">'
      + '<div class="sub-tab yesterday active" id="subtab-'+tema.id+'-yesterday" onclick="showSubTab(\''+tema.id+'\',\'yesterday\')">\uD83D\uDFE2 Recentes'+yCount+'</div>'
      + '<div class="sub-tab week" id="subtab-'+tema.id+'-week" onclick="showSubTab(\''+tema.id+'\',\'week\')">Esta semana'+wCount+'</div>'
      + '</div>'
      + '<div class="sub-content active" id="subcontent-'+tema.id+'-yesterday">'+yHTML+'</div>'
      + '<div class="sub-content" id="subcontent-'+tema.id+'-week">'+wHTML+'</div>'
      + '</div>';
  });
  area.innerHTML = html;
  showTab(activeTab || TEMAS[0].id);
}

function showHistorico() {
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.querySelectorAll('.section').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById('tab-_historico').classList.add('active');
  var panel = document.getElementById('hist-panel');
  var ca = document.getElementById('content-area');
  ca.style.display = 'none';
  panel.style.display = 'block';
  var items = globalHistorico.map(function(e, i) {
    return '<div class="hist-item'+(i===0?' hist-current':'')+'" onclick="loadEdicao(\''+e.arquivo+'\',\''+esc(e.label)+'\')">'
      + '<div><div class="hist-label">'+esc(e.label)+'</div>'
      + '<div class="hist-sub">'+esc(e.arquivo.replace('.json','').replace(/(\d{4})-(\d{2})-(\d{2})/,'$3/$2/$1'))+'</div></div>'
      + '<div class="hist-arr">\u203A</div></div>';
  }).join('') || '<div class="empty">Nenhuma edi\u00e7\u00e3o anterior</div>';
  panel.innerHTML = '<div class="hist-section"><div style="padding:12px 16px 8px;font-size:11px;color:#4B5563;font-family:monospace;border-bottom:1px solid #1F2937">Clique em uma edi\u00e7\u00e3o para abrir</div>'+items+'</div>';
  activeTab = '_historico';
}

function renderTabs() {
  var tabsHtml = TEMAS.map(function(t) {
    return '<div class="tab" id="tab-'+t.id+'" onclick="showTab(\''+t.id+'\')">'+esc(t.label)+'</div>';
  }).join('');
  document.getElementById('tabs-bar').innerHTML = tabsHtml + '<div class="tab" id="tab-_historico" onclick="showHistorico()">\uD83D\uDCC5 Hist\u00f3rico</div>';
}

async function load() {
  try {
    var resp = await fetch(BASE+'/dados/index.json?t='+Date.now());
    if (!resp.ok) throw new Error('HTTP '+resp.status);
    var idx = await resp.json();
    globalHistorico = idx.edicoes || [];
    var latest = (idx.edicoes||[])[0];
    if (!latest) throw new Error('Nenhuma edi\u00e7\u00e3o publicada');
    var resp2 = await fetch(BASE+'/dados/'+latest.arquivo+'?t='+Date.now());
    if (!resp2.ok) throw new Error('HTTP '+resp2.status);
    var data = await resp2.json();
    renderContent(data);
  } catch(e) {
    document.getElementById('content-area').innerHTML = '<div class="state-msg"><div class="icon">\u26A0</div><div class="txt">N\u00e3o foi poss\u00edvel carregar o briefing.</div><div class="err">'+e.message+'</div></div>';
    document.getElementById('hdr-date').textContent = 'Erro ao carregar';
  }
}

async function loadEdicao(arquivo, label) {
  document.getElementById('hist-panel').style.display = 'none';
  document.getElementById('content-area').style.display = 'block';
  activeTab = TEMAS[0].id;
  var area = document.getElementById('content-area');
  area.innerHTML = '<div class="state-msg"><div class="icon" style="animation:spin 1s linear infinite">&#8635;</div><div class="txt">Carregando edi\u00e7\u00e3o de '+label+'...</div></div>';
  document.getElementById('hdr-date').textContent = 'Edi\u00e7\u00e3o de '+label;
  showTab(TEMAS[0].id);
  try {
    var resp = await fetch(BASE+'/dados/'+arquivo+'?t='+Date.now());
    if (!resp.ok) throw new Error('HTTP '+resp.status);
    var data = await resp.json();
    renderContent(data);
  } catch(e) {
    area.innerHTML = '<div class="state-msg"><div class="icon">\u26A0</div><div class="txt">Erro ao carregar.</div><div class="err">'+e.message+'</div></div>';
  }
}

function resetUpdateBtn() {
  var btn = document.getElementById('btn-update');
  var icon = document.getElementById('btn-icon');
  var lbl = document.getElementById('btn-label');
  if (btn) { btn.style.opacity='1'; btn.style.pointerEvents='auto'; }
  if (icon) { icon.style.animation=''; icon.innerHTML='&#8635;'; }
  if (lbl) lbl.textContent = 'Atualizar';
}

function startPolling(token) {
  if (pollingInterval) clearInterval(pollingInterval);
  var tentativas = 0;
  pollingInterval = setInterval(async function() {
    tentativas++;
    if (tentativas > 20) { clearInterval(pollingInterval); showToast('\u26A0 Tempo limite. Recarregue manualmente.', 5000); resetUpdateBtn(); return; }
    try {
      var resp = await fetch('https://api.github.com/repos/'+GITHUB_USER+'/'+GITHUB_REPO+'/actions/runs?per_page=1', {
        headers: {'Authorization':'Bearer '+token, 'Accept':'application/vnd.github+json'}
      });
      if (!resp.ok) return;
      var data = await resp.json();
      var run = (data.workflow_runs||[])[0];
      if (!run) return;
      var lbl = document.getElementById('btn-label');
      if (run.status === 'completed') {
        clearInterval(pollingInterval);
        if (run.conclusion === 'success') {
          showToast('\u2705 Briefing atualizado! Recarregando...', 3000);
          setTimeout(function(){ location.reload(); }, 3000);
        } else {
          showToast('\u274C Workflow falhou.', 5000);
          resetUpdateBtn();
        }
      } else {
        if (lbl) lbl.textContent = 'Em andamento... '+(tentativas*2)+'min';
      }
    } catch(e) {}
  }, 120000);
}

async function triggerUpdate() {
  var passOk = sessionStorage.getItem('admin_ok');
  if (!passOk) {
    var entrada = prompt('Senha de administrador:');
    if (!entrada) return;
    if (entrada !== ADMIN_PASS) { showToast('\u274C Senha incorreta.', 3000); return; }
    sessionStorage.setItem('admin_ok','1');
  }
  var token = localStorage.getItem('gh_token');
  if (!token) {
    token = prompt('Cole seu GitHub Personal Access Token:');
    if (!token) return;
    localStorage.setItem('gh_token', token.trim());
    token = token.trim();
  }
  var btn = document.getElementById('btn-update');
  var icon = document.getElementById('btn-icon');
  var lbl = document.getElementById('btn-label');
  btn.style.opacity = '0.5'; btn.style.pointerEvents = 'none';
  icon.style.animation = 'spin 1s linear infinite';
  lbl.textContent = 'Aguarde...';
  try {
    var resp = await fetch('https://api.github.com/repos/'+GITHUB_USER+'/'+GITHUB_REPO+'/actions/workflows/'+GH_WORKFLOW+'/dispatches', {
      method:'POST',
      headers:{'Authorization':'Bearer '+token,'Accept':'application/vnd.github+json','Content-Type':'application/json'},
      body:JSON.stringify({ref:'main'})
    });
    if (resp.status === 204) {
      showToast('\u2705 Atualiza\u00e7\u00e3o iniciada! Verificando a cada 2 min...', 5000);
      lbl.textContent = 'Em andamento...';
      startPolling(token);
    } else if (resp.status === 401) {
      localStorage.removeItem('gh_token');
      showToast('\u274C Token inv\u00e1lido.', 4000);
      resetUpdateBtn();
    } else {
      showToast('\u274C Erro '+resp.status, 4000);
      resetUpdateBtn();
    }
  } catch(e) { showToast('\u274C Erro de conex\u00e3o.', 4000); resetUpdateBtn(); }
}

var CONTEXTO_ITAU = 'Voce e um analista estrategico senior do Banco Itau especializado em: '
  + 'Itau Cartoes (cartoes credito debito adquirencia rotativo parcelado maquininhas), '
  + 'Daily Banking (conta corrente Pix credito pessoal consignado financiamentos), '

  + 'Itau Shop (marketplace do Itau cashback beneficios compras integradas), '
  + 'TAG (tag veicular Itau pedagio mobilidade urbana Free Flow gestao de frota), '
  + 'Loyalty (programa de pontos Itau milhas cashback fidelizacao parcerias).';

async function analisarNoticia(itemId) {
  var d = window._newsData[itemId] || {};
  var titulo = d.titulo || '';
  var url = d.url || '';
  var destaque = d.destaque || '';
  var btn = document.getElementById('btn-'+itemId);
  var panel = document.getElementById('panel-'+itemId);

  if (panel.classList.contains('open')) {
    panel.classList.remove('open');
    btn.textContent = '\u2756 Analisar';
    btn.classList.remove('loading');
    return;
  }
  if (panel.innerHTML && !panel.querySelector('.analise-loading')) {
    panel.classList.add('open');
    btn.textContent = '\u2715 Fechar';
    return;
  }

  btn.classList.add('loading');
  btn.textContent = '&#8635; Analisando...';
  panel.innerHTML = '<div class="analise-loading" style="color:#4B5563;font-size:11px;font-family:monospace;padding:8px 0">Lendo artigo e gerando analise...</div>';
  panel.classList.add('open');

  if (typeof gtag !== 'undefined') gtag('event','analise_noticia',{event_category:'IA',event_label:titulo.substring(0,100)});

  try {
    var prompt = CONTEXTO_ITAU
      + '\n\nLeia o artigo completo nesta URL: ' + url
      + '\n\nTitulo: "' + titulo + '"\nTrecho: "' + destaque + '"'
      + '\n\nRetorne APENAS este JSON:\n{"resumo":"resumo em 2-3 frases","cartoes":"impacto Itau Cartoes","daily_banking":"impacto Daily Banking","beyond_banking":"impacto Beyond Banking","itau_shop":"impacto Itau Shop","tag":"impacto TAG Itau","loyalty":"impacto Loyalty Itau","insights":"principal insight estrategico"}';

    var response = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1500,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        messages:[{role:'user',content:prompt}]
      })
    });

    var data = await response.json();
    var text = '';
    if (data.content) data.content.forEach(function(b){ if(b.type==='text') text+=b.text; });

    var analise;
    try {
      var clean = text.replace(/```json|```/g,'').trim();
      var m = clean.match(/\{[\s\S]*\}/);
      analise = JSON.parse(m ? m[0] : clean);
    } catch(e) { throw new Error('Erro ao processar resposta'); }

    panel.innerHTML = ''
      + '<div class="analise-section"><div class="analise-label" style="color:#F9FAFB">Resumo</div><div class="analise-text">'+esc(analise.resumo||'')+'</div></div>'
      + '<div style="border-top:1px solid #1F2937;margin:10px 0"></div>'
      + '<div class="analise-section"><div class="analise-label lbl-cartoes">Itau Cartoes</div><div class="analise-text">'+esc(analise.cartoes||'Sem impacto direto')+'</div></div>'
      + '<div class="analise-section"><div class="analise-label lbl-daily">Daily Banking</div><div class="analise-text">'+esc(analise.daily_banking||'Sem impacto direto')+'</div></div>'
      + '<div class="analise-section"><div class="analise-label lbl-beyond">Beyond Banking</div><div class="analise-text">'+esc(analise.beyond_banking||'Sem impacto direto')+'</div></div>'
      + '<div class="analise-section"><div class="analise-label lbl-shop">Itau Shop</div><div class="analise-text">'+esc(analise.itau_shop||'Sem impacto direto')+'</div></div>'
      + '<div class="analise-section"><div class="analise-label lbl-tag">TAG</div><div class="analise-text">'+esc(analise.tag||'Sem impacto direto')+'</div></div>'
      + '<div class="analise-section"><div class="analise-label lbl-loyalty">Loyalty</div><div class="analise-text">'+esc(analise.loyalty||'Sem impacto direto')+'</div></div>'
      + '<div style="border-top:1px solid #1F2937;margin:10px 0"></div>'
      + '<div class="analise-section"><div class="analise-label" style="color:#F59E0B">Insight Estrategico</div><div class="analise-text" style="color:#F9FAFB;font-weight:500">'+esc(analise.insights||'')+'</div></div>';

    btn.classList.remove('loading');
    btn.textContent = '\u2715 Fechar';

  } catch(e) {
    panel.innerHTML = '<div style="color:#EF4444;font-size:11px;font-family:monospace">Erro: '+esc(e.message)+'</div>';
    btn.classList.remove('loading');
    btn.textContent = '\u2756 Analisar';
  }
}
