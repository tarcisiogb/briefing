<title>Daily News · Briefing de Mercado</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:#030712;color:#F9FAFB;font-family:system-ui,-apple-system,sans-serif;min-height:100vh;padding-bottom:env(safe-area-inset-bottom)}

  /* HEADER */
  .header{background:#030712;border-bottom:1px solid #111827;padding:52px 20px 14px;position:sticky;top:0;z-index:100}
  .agent-row{display:flex;align-items:center;gap:7px;margin-bottom:3px}
  .dot{width:6px;height:6px;border-radius:50%;background:#10B981;box-shadow:0 0 7px #10B981;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .agent-label{font-size:10px;color:#10B981;font-family:monospace;letter-spacing:.1em}
  h1{font-size:20px;font-weight:700}
  .header-meta{display:flex;justify-content:space-between;align-items:center;margin-top:2px}
  .header-date{font-size:11px;color:#6B7280;font-family:monospace}

  /* TOP TABS: temas */
  .tabs{display:flex;overflow-x:auto;padding:10px 20px 0;gap:4px;background:#030712;border-bottom:1px solid #111827;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex-shrink:0;padding:7px 13px;border-radius:8px 8px 0 0;font-size:12px;font-weight:500;color:#6B7280;background:transparent;border:1px solid transparent;border-bottom:none;cursor:pointer;white-space:nowrap}
  .tab.active{background:#0D1117;border-color:#1F2937;color:#F9FAFB;font-weight:600}

  /* CONTENT */
  .content{background:#0D1117;border-left:1px solid #1F2937;border-right:1px solid #1F2937;border-bottom:1px solid #1F2937;margin:0 10px;border-radius:0 0 12px 12px;padding:0;min-height:200px;margin-bottom:16px}
  .section{display:none}.section.active{display:block}

  /* SECTION HEADER */
  .sec-header{padding:14px 16px 10px;border-bottom:1px solid #1F2937}
  .sec-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;margin-bottom:4px}
  .sec-resumo{color:#9CA3AF;font-size:12px;line-height:1.6}
  .sec-termo{display:inline-block;font-size:10px;font-weight:700;font-family:monospace;padding:2px 8px;border-radius:4px;margin-top:6px}
  .positivo{color:#10B981;background:#022c22;border:1px solid #065F46}
  .neutro{color:#F59E0B;background:#1c1400;border:1px solid #3d2e00}
  .negativo{color:#EF4444;background:#1a0a0a;border:1px solid #3b1111}

  /* SUB-TABS: Ontem / Semana */
  .sub-tabs{display:flex;padding:10px 16px 0;gap:6px;border-bottom:1px solid #1F2937}
  .sub-tab{padding:6px 14px;border-radius:6px 6px 0 0;font-size:11px;font-weight:600;cursor:pointer;border:1px solid transparent;border-bottom:none;white-space:nowrap}
  .sub-tab.yesterday{color:#10B981;border-color:transparent}
  .sub-tab.yesterday.active{background:#022c22;border-color:#065F46;color:#10B981}
  .sub-tab.week{color:#6B7280;border-color:transparent}
  .sub-tab.week.active{background:#111827;border-color:#1F2937;color:#9CA3AF}
  .sub-content{display:none;padding:0 16px 12px}
  .sub-content.active{display:block}

  /* EMPTY STATE */
  .empty{padding:20px 0;text-align:center;color:#374151;font-size:12px;font-family:monospace}

  /* DAY BADGE */
  .day-label{font-size:9px;font-family:monospace;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#10B981;padding:10px 0 6px;border-top:1px solid #1F2937;margin-top:4px}
  .day-label:first-child{border-top:none;margin-top:0;padding-top:10px}

  /* NEWS ITEMS */
  .item{display:flex;gap:12px;padding:12px 0;border-bottom:1px dashed #1a2a1a}
  .sub-content.week .item{border-bottom-color:#1F2937}
  .item:last-child{border-bottom:none}
  .num{color:#374151;font-size:10px;font-family:monospace;min-width:18px;padding-top:2px;flex-shrink:0}
  .body{flex:1;display:flex;flex-direction:column;gap:5px}
  .meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  .cat{font-size:9px;font-weight:700;font-family:monospace;text-transform:uppercase}
  .cat-reg{color:#818CF8}.cat-merc{color:#38BDF8}.cat-tec{color:#A78BFA}.cat-comp{color:#FB7185}.cat-tend{color:#34D399}
  .badge{font-size:8px;font-weight:700;padding:2px 5px;border-radius:3px;color:#fff;font-family:monospace}
  .badge-alto{background:#EF4444}.badge-medio{background:#F59E0B}.badge-baixo{background:#10B981}
  .dt{font-size:9px;font-family:monospace;padding:1px 5px;border-radius:3px;font-weight:600;color:#6B7280}
  a.news{color:#E2E8F0;font-size:14px;font-weight:600;line-height:1.45;text-decoration:none;display:block}
  a.news:hover,a.news:active{color:#60A5FA}
  .dest{color:#6B7280;font-size:12px;line-height:1.5;border-left:2px solid #1F2937;padding-left:8px;font-style:italic}
  .fonte{color:#4B5563;font-size:10px;font-family:monospace}

  /* HISTORY TAB */
  .hist-section{padding:14px 16px}
  .hist-item{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid #1F2937;text-decoration:none}
  .hist-item:last-child{border-bottom:none}
  .hist-label{font-size:13px;font-weight:600;color:#F9FAFB}
  .hist-sub{font-size:10px;color:#4B5563;font-family:monospace;margin-top:2px}
  .hist-arr{color:#374151;font-size:16px}
  .hist-current .hist-label{color:#60A5FA}

  /* STATE */
  .state-msg{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:14px;color:#4B5563}
  .state-msg .icon{font-size:32px}
  .state-msg .txt{font-size:13px;font-family:monospace;text-align:center}
  .state-msg .err{color:#EF4444;font-size:11px;font-family:monospace;margin-top:4px}

  footer{text-align:center;padding:16px 16px 32px;color:#1F2937;font-size:10px;font-family:monospace;line-height:1.8}
  @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.btn-analisar{background:transparent;border:1px solid #1F2937;border-radius:6px;color:#A78BFA;font-size:9px;font-family:monospace;font-weight:700;padding:2px 8px;cursor:pointer;white-space:nowrap;letter-spacing:.05em}
.btn-analisar:hover{background:#1F2937;border-color:#A78BFA}
.btn-analisar.loading{color:#6B7280;border-color:#1F2937;cursor:wait}
.analise-panel{display:none;margin-top:10px;background:#0a0f1e;border:1px solid #1F2937;border-radius:8px;padding:14px;font-size:12px;line-height:1.6}
.analise-panel.open{display:block}
.analise-section{margin-bottom:10px}
.analise-section:last-child{margin-bottom:0}
.analise-label{font-size:9px;font-weight:700;font-family:monospace;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.analise-text{color:#9CA3AF;font-size:12px;line-height:1.6}
.lbl-cartoes{color:#38BDF8}.lbl-daily{color:#10B981}.lbl-beyond{color:#A78BFA}.lbl-shop{color:#FB7185}.lbl-tag{color:#F59E0B}.lbl-loyalty{color:#34D399}
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:#0D1117;border:1px solid #1F2937;border-radius:10px;padding:12px 20px;font-size:12px;font-family:monospace;color:#F9FAFB;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="header">
  <div class="agent-row"><div class="dot"></div><span class="agent-label">AGENTE ATIVO · SEG · QUA · SEX · 05:00</span></div>
  <div style="display:flex;justify-content:space-between;align-items:flex-start">
    <h1>Daily News</h1>
    <button id="btn-update" onclick="triggerUpdate()"
      style="background:#0D1117;border:1px solid #1F2937;border-radius:8px;color:#10B981;font-size:11px;font-family:monospace;padding:6px 12px;cursor:pointer;display:flex;align-items:center;gap:5px;margin-top:2px;white-space:nowrap">
      <span id="btn-icon">⟳</span>
      <span id="btn-label">Atualizar</span>
      <span style="font-size:8px;background:#1a0a0a;color:#EF4444;border:1px solid #3b1111;border-radius:3px;padding:1px 5px;margin-left:2px">ADMIN</span>
    </button>
  </div>
  <div class="header-meta"><span class="header-date" id="hdr-date">Carregando...</span></div>
</div>

<div class="tabs" id="tabs-bar"></div>

<div id="hist-panel" style="display:none;background:#0D1117;border-left:1px solid #1F2937;border-right:1px solid #1F2937;border-bottom:1px solid #1F2937;margin:0 10px 16px;border-radius:0 0 12px 12px;"></div>
<div class="content" id="content-area">
  <div class="state-msg"><div class="icon" style="animation:spin 1s linear infinite">⟳</div><div class="txt">Carregando briefing...</div></div>
</div>

<footer id="footer-txt"></footer>

<script>
// ── CONFIGURAÇÃO ─────────────────────────────────────
const GITHUB_USER = 'tarcisiogb';  // ← altere aqui
const GITHUB_REPO = 'dailynews';
const BASE = `https://${GITHUB_USER}.github.io/${GITHUB_REPO}`;
// ─────────────────────────────────────────────────────

const TEMAS = [
  {id:'cartoes',    label:'💳 Cartões'},
  {id:'pagamentos', label:'📲 Pagamentos'},
  {id:'marketplace',label:'🛒 Marketplace'},
  {id:'varejo',     label:'🏪 Varejo'},
  {id:'tag',        label:'🚗 Tag Veicular'},
  {id:'bancos',     label:'🏦 Bancos'},
  {id:'fintechs',   label:'⚡ Fintechs'},
  {id:'loyalty',    label:'🎯 Loyalty'},
  {id:'ia',         label:'🤖 IA'},
  {id:'socios',     label:'🏢 Sócios'},
];

// Cores das cross-tags por tema
const TEMA_CORES = {
  cartoes:     {bg:'#EFF6FF', border:'#BFDBFE', text:'#1D4ED8'},
  pagamentos:  {bg:'#F0FDFA', border:'#99F6E4', text:'#0F766E'},
  marketplace: {bg:'#FFF7ED', border:'#FED7AA', text:'#C2410C'},
  varejo:      {bg:'#F0FDF4', border:'#BBF7D0', text:'#15803D'},
  tag:         {bg:'#FEF9C3', border:'#FDE68A', text:'#A16207'},
  bancos:      {bg:'#EFF6FF', border:'#BFDBFE', text:'#1E40AF'},
  fintechs:    {bg:'#FAF5FF', border:'#E9D5FF', text:'#7C3AED'},
  loyalty:     {bg:'#FFF1F2', border:'#FECDD3', text:'#BE123C'},
  ia:          {bg:'#F0FDF4', border:'#6EE7B7', text:'#065F46'},
  socios:      {bg:'#F5F3FF', border:'#DDD6FE', text:'#5B21B6'},
};

const CAT = {Regulatório:'cat-reg',Mercado:'cat-merc',Tecnologia:'cat-tec',Competição:'cat-comp',Tendência:'cat-tend'};
const IMP = {alto:'badge-alto',médio:'badge-medio',baixo:'badge-baixo'};
const TERMO_LBL = {positivo:'↑ POSITIVO',neutro:'→ NEUTRO',negativo:'↓ NEGATIVO'};
const months = {jan:1,fev:2,mar:3,abr:4,mai:5,jun:6,jul:7,ago:8,set:9,out:10,nov:11,dez:12};

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function parseDate(d){
  const m=String(d).match(/^(\d{1,2})\/(\w{3})\/(\d{4})$/);
  if(!m) return null;
  return new Date(+m[3],(months[m[2].toLowerCase()]||1)-1,+m[1]);
}

function isYesterday(d){
  // Recentes = hoje + 2 dias anteriores (3 dias no total)
  const pub=parseDate(d); if(!pub) return false;
  const cutoff=new Date(); cutoff.setDate(cutoff.getDate()-2); cutoff.setHours(0,0,0,0);
  const tomorrow=new Date(); tomorrow.setDate(tomorrow.getDate()+1); tomorrow.setHours(0,0,0,0);
  return pub>=cutoff && pub<tomorrow;
}

function isThisWeek(d){
  // Semana = entre 3 e 14 dias atrás
  const pub=parseDate(d); if(!pub) return false;
  const cutoff=new Date(); cutoff.setDate(cutoff.getDate()-14); cutoff.setHours(0,0,0,0);
  const recente=new Date(); recente.setDate(recente.getDate()-2); recente.setHours(0,0,0,0);
  return pub>=cutoff && pub<recente;
}

let activeTab = null;
let activeSubTab = {}; // per-section
let globalData = null;
let globalHistorico = [];

function renderTabs(){
  const tabsHtml = TEMAS.map(t=>
    `<div class="tab" id="tab-${t.id}" onclick="showTab('${t.id}')">${esc(t.label)}</div>`
  ).join('');
  // Adiciona aba de histórico separada no final
  document.getElementById('tabs-bar').innerHTML = tabsHtml +
    `<div class="tab" id="tab-_historico" onclick="showHistorico()">📅 Histórico</div>`;
}

function showTab(id){
  activeTab=id;
  // Garante que histórico fica oculto
  const hp = document.getElementById('hist-panel');
  const ca = document.getElementById('content-area');
  if(hp) hp.style.display='none';
  if(ca) ca.style.display='block';
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  const te=document.getElementById('tab-'+id); if(te) te.classList.add('active');
  const se=document.getElementById('sec-'+id); if(se) se.classList.add('active');
}

function showSubTab(secId, which){
  activeSubTab[secId]=which;
  ['yesterday','week'].forEach(w=>{
    const st=document.getElementById(`subtab-${secId}-${w}`);
    const sc=document.getElementById(`subcontent-${secId}-${w}`);
    if(st) st.classList.toggle('active', w===which);
    if(sc) sc.classList.toggle('active', w===which);
  });
}

function itemHTML(n, i){
  const catCls = CAT[n.categoria]||'cat-merc';
  const impCls = IMP[n.impacto]||'badge-medio';

  // Cross-tags clicáveis
  let crossHTML = '';
  if (n.tambem_em && n.tambem_em.length) {
    crossHTML = n.tambem_em.map(tid => {
      const t = TEMAS.find(x => x.id === tid);
      if (!t) return '';
      const cor = TEMA_CORES[tid] || {bg:'#F3F4F6', border:'#D1D5DB', text:'#374151'};
      return `<span onclick="showTab('${tid}')" style="display:inline-flex;align-items:center;gap:3px;font-size:9px;font-family:monospace;background:${cor.bg};border:0.5px solid ${cor.border};border-radius:4px;padding:2px 7px;color:${cor.text};cursor:pointer" title="Ver também em ${t.label}">↗ ${t.label}</span>`;
    }).join('');
  }

  const itemId = `item-${Math.random().toString(36).substr(2,9)}`;
  return `<div class="item">
    <span class="num">${String(i+1).padStart(2,'0')}</span>
    <div class="body">
      <div class="meta">
        <span class="cat ${esc(catCls)}">${esc(n.categoria)}</span>
        <span class="badge ${esc(impCls)}">${esc((n.impacto||'').toUpperCase())}</span>
        <span class="dt">${esc(n.data_pub)}</span>
        ${crossHTML}
      </div>
      <a class="news" href="${esc(n.url)}" target="_blank" rel="noopener">${esc(n.titulo)} ↗</a>
      <div class="dest">${esc(n.destaque)}</div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:2px">
        <div class="fonte">📰 ${esc(n.fonte)}</div>
        <button class="btn-analisar" id="btn-${itemId}" onclick="analisarNoticia('${itemId}')">✦ Analisar</button>
      </div>
      <div class="analise-panel" id="panel-${itemId}"></div>
    </div>
  </div>`;
}

function renderContent(data){
  globalData=data;
  document.getElementById('hdr-date').textContent='Edição de '+(data.data_edicao||'');
  document.getElementById('footer-txt').textContent=
    `Briefing de Mercado · ${data.data_geracao||''} · Datas verificadas diretamente nas matérias`;

  const area=document.getElementById('content-area');
  area.innerHTML = TEMAS.map(tema => {


    const sec=(data.temas||{})[tema.id];
    if(!sec) return `<div class="section" id="sec-${tema.id}"></div>`;

    const noticias=sec.noticias||[];
    const yesterday=noticias.filter(n=>isYesterday(n.data_pub));
    const week=noticias.filter(n=>isThisWeek(n.data_pub));

    const yHTML = yesterday.length
      ? yesterday.map(itemHTML).join('')
      : '<div class="empty">Nenhuma notícia recente ainda</div>';

    const wHTML = week.length
      ? week.map(itemHTML).join('')
      : '<div class="empty">Nenhuma notícia adicional esta semana</div>';

    const yCount = yesterday.length ? `<span style="font-size:10px;background:#022c22;color:#10B981;border:1px solid #065F46;border-radius:10px;padding:1px 7px;font-family:monospace;margin-left:6px">${yesterday.length}</span>` : '';
    const wCount = week.length ? `<span style="font-size:10px;background:#111827;color:#6B7280;border:1px solid #1F2937;border-radius:10px;padding:1px 7px;font-family:monospace;margin-left:6px">${week.length}</span>` : '';

    const defaultSub = 'yesterday'; // sempre abre em Recentes

    return `<div class="section" id="sec-${tema.id}">
      <div class="sec-header">
        <div class="sec-title">${esc(tema.label)}</div>
        <div class="sec-resumo">${esc(sec.resumo)}</div>
        <span class="sec-termo ${esc(sec.termometro)}">${TERMO_LBL[sec.termometro]||'→ NEUTRO'}</span>
      </div>
      <div class="sub-tabs">
        <div class="sub-tab yesterday${defaultSub==='yesterday'?' active':''}" id="subtab-${tema.id}-yesterday"
          onclick="showSubTab('${tema.id}','yesterday')">🟢 Recentes${yCount}</div>
        <div class="sub-tab week${defaultSub==='week'?' active':''}" id="subtab-${tema.id}-week"
          onclick="showSubTab('${tema.id}','week')">Esta semana${wCount}</div>
      </div>
      <div class="sub-content${defaultSub==='yesterday'?' active':''}" id="subcontent-${tema.id}-yesterday">
        ${yHTML}
      </div>
      <div class="sub-content${defaultSub==='week'?' active':''}" id="subcontent-${tema.id}-week">
        ${wHTML}
      </div>
    </div>`;
  }).join('');

  showTab(activeTab||TEMAS[0].id);
}

function showHistorico(){
  // Desativa todos os temas
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('tab-_historico').classList.add('active');

  // Mostra painel de histórico (fora do content-area)
  const panel = document.getElementById('hist-panel');
  const contentArea = document.getElementById('content-area');
  contentArea.style.display = 'none';
  panel.style.display = 'block';

  // Renderiza lista
  const items = globalHistorico.map((e,i)=>
    `<div class="hist-item${i===0?' hist-current':''}" onclick="loadEdicao('${e.arquivo}','${esc(e.label)}')">
      <div>
        <div class="hist-label">${esc(e.label)}</div>
        <div class="hist-sub">${esc(e.arquivo.replace('.json','').replace(/(\d{4})-(\d{2})-(\d{2})/,'$3/$2/$1'))}</div>
      </div>
      <div class="hist-arr">›</div>
    </div>`
  ).join('') || '<div class="empty">Nenhuma edição anterior</div>';

  panel.innerHTML = `
    <div class="hist-section">
      <div style="padding:12px 16px 8px;font-size:11px;color:#4B5563;font-family:monospace;border-bottom:1px solid #1F2937">
        Clique em uma edição para abrir
      </div>
      ${items}
    </div>`;
  activeTab = '_historico';
}

async function load(){
  try{
    const idx=await fetch(`${BASE}/dados/index.json?t=${Date.now()}`).then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json();});
    globalHistorico=idx.edicoes||[];
    const latest=(idx.edicoes||[])[0];
    if(!latest) throw new Error('Nenhuma edição publicada');
    const data=await fetch(`${BASE}/dados/${latest.arquivo}?t=${Date.now()}`).then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json();});
    renderContent(data);
  }catch(e){
    document.getElementById('content-area').innerHTML=
      `<div class="state-msg"><div class="icon">⚠</div><div class="txt">Não foi possível carregar o briefing.</div><div class="err">${e.message}</div></div>`;
    document.getElementById('hdr-date').textContent='Erro ao carregar';
  }
}

async function loadEdicao(arquivo, label){
  // Esconde painel de histórico, mostra content-area
  document.getElementById('hist-panel').style.display = 'none';
  document.getElementById('content-area').style.display = 'block';
  activeTab = TEMAS[0].id;

  const area = document.getElementById('content-area');
  area.innerHTML = '<div class="state-msg"><div class="icon" style="animation:spin 1s linear infinite">⟳</div><div class="txt">Carregando edição de '+label+'...</div></div>';

  // Atualiza header
  document.getElementById('hdr-date').textContent = 'Edição de ' + label;
  showTab(TEMAS[0].id);

  try {
    const data = await fetch(BASE+'/dados/'+arquivo+'?t='+Date.now())
      .then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); });
    renderContent(data);
  } catch(e) {
    area.innerHTML = '<div class="state-msg"><div class="icon">⚠</div><div class="txt">Erro ao carregar edição.</div><div class="err">'+e.message+'</div></div>';
  }
}

// ── Polling: verifica se workflow terminou ───────────────────────
let pollingInterval = null;

async function startPolling(token){
  // Para polling anterior se existir
  if(pollingInterval) clearInterval(pollingInterval);

  let tentativas = 0;
  const maxTentativas = 20; // 40 minutos máximo

  pollingInterval = setInterval(async ()=>{
    tentativas++;
    if(tentativas > maxTentativas){
      clearInterval(pollingInterval);
      showToast('⚠ Tempo limite. Recarregue manualmente.', 5000);
      const btn = document.getElementById('btn-update');
      const icon = document.getElementById('btn-icon');
      const label = document.getElementById('btn-label');
      btn.style.opacity='1'; btn.style.pointerEvents='auto';
      icon.style.animation=''; label.textContent='Atualizar';
      return;
    }

    try {
      const resp = await fetch(
        `https://api.github.com/repos/${GH_USER}/${GH_REPO}/actions/runs?per_page=1`,
        { headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json' } }
      );
      if(!resp.ok) return;
      const data = await resp.json();
      const run = (data.workflow_runs||[])[0];
      if(!run) return;

      const label = document.getElementById('btn-label');
      if(run.status === 'completed'){
        clearInterval(pollingInterval);
        if(run.conclusion === 'success'){
          showToast('✅ Briefing atualizado! Recarregando...', 3000);
          setTimeout(()=>location.reload(), 3000);
        } else {
          showToast('❌ Workflow falhou. Verifique o GitHub Actions.', 5000);
          const btn = document.getElementById('btn-update');
          const icon = document.getElementById('btn-icon');
          btn.style.opacity='1'; btn.style.pointerEvents='auto';
          icon.style.animation=''; label.textContent='Atualizar';
        }
      } else {
        // Ainda rodando — atualiza label com tempo decorrido
        const mins = tentativas * 2;
        if(label) label.textContent = `Em andamento... ${mins}min`;
      }
    } catch(e) {
      // Ignora erros de rede no polling
    }
  }, 120000); // a cada 2 minutos
}

// ── Atualização manual via GitHub Actions ────────────────────────
const GH_USER = 'tarcisiogb';
const GH_REPO = 'dailynews';
const GH_WORKFLOW = 'briefing-diario.yml';

function showToast(msg, duration=3000){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), duration);
}

const ADMIN_PASS = '214563';

async function triggerUpdate(){
  const btn   = document.getElementById('btn-update');
  const icon  = document.getElementById('btn-icon');
  const label = document.getElementById('btn-label');

  // Verifica senha admin
  const passOk = sessionStorage.getItem('admin_ok');
  if(!passOk){
    const entrada = prompt('Senha de administrador:');
    if(!entrada) return;
    if(entrada !== ADMIN_PASS){
      showToast('❌ Senha incorreta.', 3000);
      return;
    }
    sessionStorage.setItem('admin_ok', '1');
  }

  // Pega token salvo ou pede (só na primeira vez no dispositivo)
  let token = localStorage.getItem('gh_token');
  if(!token){
    token = prompt('Cole seu GitHub Personal Access Token (permissão: workflow) — só será pedido uma vez neste dispositivo:');
    if(!token) return;
    localStorage.setItem('gh_token', token.trim());
    token = token.trim();
  }

  // Desabilita botão durante execução
  btn.style.opacity = '0.5';
  btn.style.pointerEvents = 'none';
  icon.style.animation = 'spin 1s linear infinite';
  label.textContent = 'Aguarde...';

  try {
    const resp = await fetch(
      `https://api.github.com/repos/${GH_USER}/${GH_REPO}/actions/workflows/${GH_WORKFLOW}/dispatches`,
      {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${token}`,
          'Accept': 'application/vnd.github+json',
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ ref: 'main' }),
      }
    );

    if(resp.status === 204){
      showToast('✅ Atualização iniciada! Pronto em ~25 min.', 6000);
      label.textContent = 'Em andamento...';
      icon.style.animation = 'spin 2s linear infinite';
      // Conta regressiva no botão
      let mins = 25;
      const countdown = setInterval(()=>{
        mins--;
        if(mins > 0){
          label.textContent = `Em andamento... ${mins}min`;
        } else {
          clearInterval(countdown);
          showToast('🔄 Recarregando briefing...');
          setTimeout(()=>location.reload(), 2000);
        }
      }, 60000);
      // Recarrega após 25 minutos
      setTimeout(()=>{
        clearInterval(countdown);
        showToast('🔄 Recarregando briefing...');
        setTimeout(()=>location.reload(), 2000);
      }, 1500000);
    } else if(resp.status === 401){
      localStorage.removeItem('gh_token');
      showToast('❌ Token inválido. Cole novamente.', 4000);
      btn.style.opacity = '1';
      btn.style.pointerEvents = 'auto';
      icon.style.animation = '';
      label.textContent = 'Atualizar';
    } else {
      showToast(`❌ Erro ${resp.status}. Tente novamente.`, 4000);
      btn.style.opacity = '1';
      btn.style.pointerEvents = 'auto';
      icon.style.animation = '';
      label.textContent = 'Atualizar';
    }
  } catch(e) {
    showToast('❌ Erro de conexão.', 4000);
    btn.style.opacity = '1';
    btn.style.pointerEvents = 'auto';
    icon.style.animation = '';
    label.textContent = 'Atualizar';
  }
}

// ── Análise IA no contexto Itaú ─────────────────────────────────
const CONTEXTO_ITAU = `Você é um analista estratégico sênior do Banco Itaú especializado em:
- 💳 Itaú Cartões: cartões de crédito e débito, adquirência, rotativo, parcelado, maquininhas, tokenização
- 🏦 Daily Banking: conta corrente, Pix, crédito pessoal, consignado, financiamentos, débito automático
- 🌐 Beyond Banking: serviços não-financeiros, ecossistema digital, parcerias estratégicas, super app
- 🛒 Itaú Shop: marketplace do Itaú, cashback, benefícios, compras integradas ao app
- 🚗 TAG: tag veicular Itaú, pedágio, mobilidade urbana, Free Flow, gestão de frota
- 🎯 Loyalty: programa de pontos Itaú, milhas, cashback, fidelização, parcerias com aéreas e varejo`;

async function analisarNoticia(itemId){
  const d = (window._newsData||{})[itemId] || {};
  const titulo = d.titulo || '';
  const url = d.url || '';
  const destaque = d.destaque || '';
  const btn   = document.getElementById('btn-' + itemId);
  const panel = document.getElementById('panel-' + itemId);

  // Toggle — se já está aberto, fecha
  if(panel.classList.contains('open')){
    panel.classList.remove('open');
    btn.textContent = '✦ Analisar';
    btn.classList.remove('loading');
    return;
  }

  // Se já tem conteúdo, só abre
  if(panel.innerHTML && !panel.querySelector('.analise-loading')){
    panel.classList.add('open');
    btn.textContent = '✕ Fechar';
    return;
  }

  // Inicia análise
  btn.classList.add('loading');
  btn.textContent = '⟳ Analisando...';
  panel.innerHTML = '<div class="analise-loading" style="color:#4B5563;font-size:11px;font-family:monospace;padding:8px 0">Lendo artigo e gerando análise...</div>';
  panel.classList.add('open');

  // Rastreia no GA
  if(typeof gtag !== 'undefined'){
    gtag('event', 'analise_noticia', { 'event_category': 'IA', 'event_label': titulo.substring(0,100) });
  }

  try {
    const prompt = `${CONTEXTO_ITAU}

Leia o artigo completo nesta URL: ${url}

Título: "${titulo}"
Trecho: "${destaque}"

Após ler o artigo completo, forneça uma análise estruturada em JSON:
{
  "resumo": "Resumo do artigo em 2-3 frases",
  "cartoes": "Impacto e oportunidades para Itaú Cartões",
  "daily_banking": "Impacto e oportunidades para Daily Banking",
  "beyond_banking": "Impacto e oportunidades para Beyond Banking",
  "itau_shop": "Impacto e oportunidades para Itaú Shop",
  "tag": "Impacto e oportunidades para TAG Itaú",
  "loyalty": "Impacto e oportunidades para Loyalty Itaú",
  "insights": "Principal insight estratégico para o Itaú"
}
Retorne APENAS o JSON, sem markdown.`;

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1500,
        tools: [{"type": "web_search_20250305", "name": "web_search"}],
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await response.json();

    // Extrai texto da resposta (pode vir após tool_use)
    let text = '';
    if(data.content){
      for(const block of data.content){
        if(block.type === 'text') text += block.text;
      }
    }

    // Parse JSON
    let analise;
    try {
      const clean = text.replace(/```json|```/g,'').trim();
      const m = clean.match(/\{[\s\S]*\}/);
      analise = JSON.parse(m ? m[0] : clean);
    } catch(e) {
      throw new Error('Erro ao processar resposta da IA');
    }

    // Renderiza painel
    panel.innerHTML = `
      <div class="analise-section">
        <div class="analise-label" style="color:#F9FAFB">📋 Resumo</div>
        <div class="analise-text">\${analise.resumo||''}</div>
      </div>
      <div style="border-top:1px solid #1F2937;margin:10px 0"></div>
      <div class="analise-section">
        <div class="analise-label lbl-cartoes">💳 Itaú Cartões</div>
        <div class="analise-text">\${analise.cartoes||'Sem impacto direto identificado'}</div>
      </div>
      <div class="analise-section">
        <div class="analise-label lbl-daily">🏦 Daily Banking</div>
        <div class="analise-text">\${analise.daily_banking||'Sem impacto direto identificado'}</div>
      </div>
      <div class="analise-section">
        <div class="analise-label lbl-beyond">🌐 Beyond Banking</div>
        <div class="analise-text">\${analise.beyond_banking||'Sem impacto direto identificado'}</div>
      </div>
      <div class="analise-section">
        <div class="analise-label lbl-shop">🛒 Itaú Shop</div>
        <div class="analise-text">\${analise.itau_shop||'Sem impacto direto identificado'}</div>
      </div>
      <div class="analise-section">
        <div class="analise-label lbl-tag">🚗 TAG</div>
        <div class="analise-text">\${analise.tag||'Sem impacto direto identificado'}</div>
      </div>
      <div class="analise-section">
        <div class="analise-label lbl-loyalty">🎯 Loyalty</div>
        <div class="analise-text">\${analise.loyalty||'Sem impacto direto identificado'}</div>
      </div>
      <div style="border-top:1px solid #1F2937;margin:10px 0"></div>
      <div class="analise-section">
        <div class="analise-label" style="color:#F59E0B">⚡ Insight Estratégico</div>
        <div class="analise-text" style="color:#F9FAFB;font-weight:500">\${analise.insights||''}</div>
      </div>
    `;

    btn.classList.remove('loading');
    btn.textContent = '✕ Fechar';

  } catch(e) {
    panel.innerHTML = `<div style="color:#EF4444;font-size:11px;font-family:monospace">❌ Erro: \${e.message}</div>`;
    btn.classList.remove('loading');
    btn.textContent = '✦ Analisar';
  }
}
